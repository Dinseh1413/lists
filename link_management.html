<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Loan Locations & PJ Links</title>
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* Specific styles for the controls and table on this page */
        .controls-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        @media (min-width: 600px) {
            .controls-container {
                grid-template-columns: 2fr 1fr;
            }
        }

        .table-wrapper {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
            margin-bottom: 80px; /* Space for bottom nav */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px; 
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        th {
            background-color: var(--primary-light);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
            white-space: nowrap;
        }

        /* Action elements styling */
        .location-select, .pj-input {
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-color);
            width: 100%;
        }

        .save-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .save-btn:disabled {
            background: var(--border-color);
            color: var(--text-light);
            cursor: not-allowed;
        }
        
        .pj-input:disabled {
            background: #eee;
            cursor: not-allowed;
        }
        
        [data-theme="dark"] .pj-input:disabled {
            background: #222;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="utils.js"></script>
</head>
<body>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h1 style="margin: 0;">Manage Locations</h1>
        </div>

        <section class="controls-container">
            <div class="form-group" style="margin-bottom:0;">
                <label for="searchInput">Search Loan ID or Customer</label>
                <input type="search" id="searchInput" placeholder="e.g., 102 or Rajesh">
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label for="locationFilter">Filter by Location</label>
                <select id="locationFilter">
                    <option value="all">All Locations</option>
                    <option value="shop">Shop</option>
                    <option value="pj">PJ</option>
                    <option value="inside">Inside</option>
                </select>
            </div>
        </section>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Location</th>
                        <th>PJ No.</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="linkTableBody">
                    <tr><td colspan="5" style="text-align:center; padding:20px; color:#888;">Loading loans...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            Dashboard
        </a>
        <a href="loan_list.html" class="nav-item active">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            Loans
        </a>
        <a href="customer_list.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            Customers
        </a>
        <a href="pj.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
            PJ List
        </a>
    </nav>
    <div id="toast-container"></div>

    <script>
        // Use the global client initialized in supabase.js
        const db = sbClient; 

        let allLoans = []; // Store data in memory for instant searching

        async function loadAllLoans() {
            // Fetch loan ID, location, pj_no, and join with customers table to get the name
            const { data: loans, error } = await db
                .from('loans')
                .select('id, location, pj_no, customers(name)')
                .order('id', { ascending: false });

            if (error) {
                console.error("Error fetching loans:", error);
                showToast("Error loading loans", "error");
                document.getElementById('linkTableBody').innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Failed to load data.</td></tr>';
                return;
            }
            
            allLoans = loans || [];
            renderTable();
        }

        function renderTable() {
            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const locationFilter = document.getElementById('locationFilter').value;
            const tbody = document.getElementById('linkTableBody');
            
            tbody.innerHTML = '';

            // 1. Filter the array
            const filteredLoans = allLoans.filter(loan => {
                const custName = loan.customers?.name?.toLowerCase() || '';
                const matchesSearch = String(loan.id).includes(searchInput) || custName.includes(searchInput);
                const matchesLocation = locationFilter === 'all' || loan.location === locationFilter;
                
                return matchesSearch && matchesLocation;
            });

            if (filteredLoans.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">No matching loans found.</td></tr>';
                return;
            }

            // 2. Generate HTML
            filteredLoans.forEach(loan => {
                const isPj = loan.location === 'pj';
                const custName = loan.customers ? loan.customers.name : 'Unknown';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:600;">#${loan.id}</td>
                    <td>${custName}</td>
                    <td>
                        <select class="location-select" onchange="updateLocation(${loan.id}, this.value)">
                            <option value="shop" ${loan.location === 'shop' ? 'selected' : ''}>Shop</option>
                            <option value="pj" ${loan.location === 'pj' ? 'selected' : ''}>PJ</option>
                            <option value="inside" ${loan.location === 'inside' ? 'selected' : ''}>Inside</option>
                        </select>
                    </td>
                    <td>
                        <input type="number" class="pj-input" id="pj_input_${loan.id}" value="${loan.pj_no || ''}" 
                               placeholder="PJ ID" ${!isPj ? 'disabled' : ''}>
                    </td>
                    <td>
                        <button class="save-btn" onclick="savePjLink(${loan.id})" ${!isPj ? 'disabled' : ''}>
                            Save PJ
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- ACTIONS ---

        // Triggers when the Location dropdown is changed
        window.updateLocation = async (loanId, newLocation) => {
            let updates = { location: newLocation };
            
            // If changing away from PJ, automatically unlink the PJ number in the database
            if (newLocation !== 'pj') {
                updates.pj_no = null; 
            }

            const { error } = await db.from('loans').update(updates).eq('id', loanId);

            if (error) {
                showToast(error.message, "error");
            } else {
                showToast(`Location updated to ${newLocation}`, "success");
                
                // Update local memory so we don't have to fetch from DB again immediately
                const loanIndex = allLoans.findIndex(l => l.id === loanId);
                if (loanIndex !== -1) {
                    allLoans[loanIndex].location = newLocation;
                    if (newLocation !== 'pj') allLoans[loanIndex].pj_no = null;
                }
                
                // Re-render table to instantly disable/enable the PJ inputs
                renderTable(); 
            }
        };

        // Triggers when "Save PJ" button is clicked
        window.savePjLink = async (loanId) => {
            const pjInput = document.getElementById(`pj_input_${loanId}`);
            const pjNo = pjInput.value.trim() === '' ? null : parseInt(pjInput.value);
            
            const btn = pjInput.parentElement.nextElementSibling.querySelector('button');
            btn.textContent = '...';
            btn.disabled = true;

            const { error } = await db.from('loans').update({ pj_no: pjNo }).eq('id', loanId);

            if (error) {
                showToast("Failed to link PJ. Ensure PJ ID exists.", "error");
            } else {
                showToast(`PJ Link saved!`, "success");
                const loanIndex = allLoans.findIndex(l => l.id === loanId);
                if (loanIndex !== -1) allLoans[loanIndex].pj_no = pjNo;
            }

            btn.textContent = 'Save PJ';
            btn.disabled = false;
        };

        // --- INIT ---
        document.getElementById('searchInput').addEventListener('input', renderTable);
        document.getElementById('locationFilter').addEventListener('change', renderTable);

        document.addEventListener('DOMContentLoaded', loadAllLoans);
    </script>
</body>
</html>
