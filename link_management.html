<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Loan Locations & PJ Links</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.default.css" rel="stylesheet">

    <style>
        .controls-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        @media (min-width: 600px) {
            .controls-container {
                grid-template-columns: 2fr 1fr 1fr;
            }
        }

        .table-wrapper {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
            margin-bottom: 80px; 
            min-height: 400px; /* Space for dropdowns to open */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px; 
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        th {
            background-color: var(--primary-light);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
            white-space: nowrap;
        }

        .location-select {
            padding: 0.6rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-color);
            width: 100%;
        }

        /* Tom Select Theme Overrides for consistency */
        .ts-control {
            border: 1px solid var(--border-color);
            border-radius: 6px; padding: 0.6rem; font-size: 0.95rem;
            background: var(--input-bg); color: var(--text-color); box-shadow: none;
        }
        .ts-wrapper.focus .ts-control {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px var(--primary-light);
        }
        .ts-dropdown {
            background: var(--card-bg); color: var(--text-color);
            border: 1px solid var(--border-color); border-radius: 6px;
        }
        .ts-dropdown .active {
            background-color: var(--primary-light); color: var(--text-color);
        }
        .ts-wrapper.disabled .ts-control {
            background: #f5f5f5; opacity: 0.6; cursor: not-allowed;
        }
        [data-theme="dark"] .ts-wrapper.disabled .ts-control { background: #222; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script src="supabase.js"></script>
    <script src="utils.js"></script>
</head>
<body>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h1 style="margin: 0;">Manage Locations</h1>
        </div>

        <section class="controls-container">
            <div class="form-group" style="margin-bottom:0;">
                <label for="searchInput">Search Loan ID or Customer</label>
                <input type="search" id="searchInput" placeholder="e.g., 102 or Rajesh">
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label for="locationFilter">Filter by Location</label>
                <select id="locationFilter">
                    <option value="all">All Locations</option>
                    <option value="shop">Shop</option>
                    <option value="pj">PJ</option>
                    <option value="inside">Inside</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label for="sortFilter">Sort By</label>
                <select id="sortFilter">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                </select>
            </div>
        </section>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Location</th>
                        <th style="min-width: 200px;">Assigned PJ Entry</th>
                    </tr>
                </thead>
                <tbody id="linkTableBody">
                    <tr><td colspan="4" style="text-align:center; padding:20px; color:#888;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            Dashboard
        </a>
        <a href="loan_list.html" class="nav-item active">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            Loans
        </a>
        <a href="customer_list.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            Customers
        </a>
        <a href="pj.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
            PJ List
        </a>
    </nav>
    <div id="toast-container"></div>

    <script>
        const db = sbClient; 

        let allLoans = [];
        let allPjs = [];
        let tsInstances = {}; 

        async function loadData() {
            try {
                // Fetch loans and PJs simultaneously for speed
                const [loansRes, pjsRes] = await Promise.all([
                    db.from('loans').select('id, location, pj_no, customers(name)').order('id', { ascending: false }),
                    db.from('pj').select('pj_id, amount, status').order('pj_id', { ascending: false })
                ]);

                if (loansRes.error) throw loansRes.error;
                if (pjsRes.error) throw pjsRes.error;

                allLoans = loansRes.data || [];
                allPjs = pjsRes.data || [];
                
                renderTable();
            } catch (error) {
                console.error("Error loading data:", error);
                showToast("Failed to load data.", "error");
            }
        }

        function renderTable() {
            // Destroy existing TomSelect instances to prevent memory leaks
            Object.values(tsInstances).forEach(ts => ts.destroy());
            tsInstances = {};

            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const locationFilter = document.getElementById('locationFilter').value;
            const sortFilter = document.getElementById('sortFilter').value;
            const tbody = document.getElementById('linkTableBody');
            
            tbody.innerHTML = '';

            // 1. Filter
            let filteredLoans = allLoans.filter(loan => {
                const custName = loan.customers?.name?.toLowerCase() || '';
                const matchesSearch = String(loan.id).includes(searchInput) || custName.includes(searchInput);
                const matchesLocation = locationFilter === 'all' || loan.location === locationFilter;
                return matchesSearch && matchesLocation;
            });

            // 2. Sort
            filteredLoans.sort((a, b) => {
                if (sortFilter === 'newest') return b.id - a.id;
                if (sortFilter === 'oldest') return a.id - b.id;
                
                const nameA = (a.customers?.name || '').toLowerCase();
                const nameB = (b.customers?.name || '').toLowerCase();
                if (sortFilter === 'name-asc') return nameA.localeCompare(nameB);
                if (sortFilter === 'name-desc') return nameB.localeCompare(nameA);
            });

            if (filteredLoans.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">No matching loans.</td></tr>';
                return;
            }

            // 3. Render HTML Rows
            filteredLoans.forEach(loan => {
                const custName = loan.customers ? loan.customers.name : 'Unknown';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:600;">#${loan.id}</td>
                    <td>${custName}</td>
                    <td>
                        <select class="location-select" onchange="updateLocation(${loan.id}, this.value)">
                            <option value="shop" ${loan.location === 'shop' ? 'selected' : ''}>Shop</option>
                            <option value="pj" ${loan.location === 'pj' ? 'selected' : ''}>PJ</option>
                            <option value="inside" ${loan.location === 'inside' ? 'selected' : ''}>Inside</option>
                        </select>
                    </td>
                    <td>
                        <select id="pj_select_${loan.id}"></select>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // 4. Initialize Tom Select on the newly created rows
            filteredLoans.forEach(loan => {
                const el = document.getElementById(`pj_select_${loan.id}`);
                const isPj = loan.location === 'pj';

                const ts = new TomSelect(el, {
                    valueField: 'pj_id',
                    labelField: 'label',
                    searchField: ['pj_id', 'label'],
                    // FILTER OUT CLOSED PJs (Unless it's already selected for this loan)
                    options: allPjs
                        .filter(p => p.status === 'Active' || p.pj_id === loan.pj_no)
                        .map(p => ({ 
                            pj_id: p.pj_id, 
                            label: `#${p.pj_id} - ₹${p.amount} (${p.status})` 
                        })),
                    items: loan.pj_no ? [loan.pj_no] : [],
                    placeholder: isPj ? 'Type Active PJ No...' : 'Not required for this location',
                    maxItems: 1,
                    onChange: function(value) {
                        const numValue = value ? parseInt(value) : null;
                        if (numValue !== loan.pj_no) {
                            updatePjLink(loan.id, numValue);
                        }
                    }
                });

                if (!isPj) {
                    ts.disable(); // Gray out the input if it's not a PJ loan
                }
                
                tsInstances[loan.id] = ts;
            });
        }

        // --- ACTIONS ---

        window.updateLocation = async (loanId, newLocation) => {
            let updates = { location: newLocation };
            if (newLocation !== 'pj') updates.pj_no = null; // Auto-unlink if changing away from PJ

            const { error } = await db.from('loans').update(updates).eq('id', loanId);

            if (error) {
                showToast(error.message, "error");
            } else {
                showToast(`Location updated to ${newLocation}`, "success");
                
                // Update memory
                const loanIndex = allLoans.findIndex(l => l.id === loanId);
                if (loanIndex !== -1) {
                    allLoans[loanIndex].location = newLocation;
                    if (newLocation !== 'pj') allLoans[loanIndex].pj_no = null;
                }
                
                renderTable(); // Re-render to enable/disable the PJ dropdown
            }
        };

        window.updatePjLink = async (loanId, pjNo) => {
            const { error } = await db.from('loans').update({ pj_no: pjNo }).eq('id', loanId);

            if (error) {
                showToast("Failed to link PJ.", "error");
            } else {
                showToast(pjNo ? `Linked to PJ #${pjNo}` : "PJ Unlinked", "success");
                
                // Update memory silently
                const loanIndex = allLoans.findIndex(l => l.id === loanId);
                if (loanIndex !== -1) allLoans[loanIndex].pj_no = pjNo;
            }
        };

        // --- INIT ---
        document.getElementById('searchInput').addEventListener('input', renderTable);
        document.getElementById('locationFilter').addEventListener('change', renderTable);
        document.getElementById('sortFilter').addEventListener('change', renderTable);

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
